catalog_tagline: "Run a responsive IT service desk that resolves incidents, fulfills requests, and ships changes without breaking the business."
catalog_description: |
  IT Service Management gives your service desk one place to capture, route, and resolve everything your workforce throws at it: outages, password resets, new-laptop requests, recurring problems, and risky changes. Tickets follow a clear lifecycle from intake to closure, with priority routing, approvals, and SLA timers built in, so nothing slips and the right person always owns the next step.

  The suite spans incident, request, problem, change, knowledge, and service-level management, plus an agent workspace that pulls the full picture together. Self-service portals and a curated knowledge base deflect routine work, while problem and change workflows keep the underlying environment stable. The result is faster resolution, fewer repeat issues, and a measurable service experience your users and auditors can both trust.

# Rendered into the SKILL.md frontmatter description:.
skill_description: "Log and resolve IT incidents and outages, fulfill service requests from a catalog, run problem investigations with root-cause analysis, and move changes and releases through approvals, CAB review, and collision checks. Prioritize and assign work by SLA timers and agent skills, deflect routine questions through a self-service portal and knowledge base, handle inbound events and alerts, and report on resolution times and service quality. Use for: help desk, helpdesk, ITIL, ticketing, ticket queue, password reset, MTTR, change advisory board, escalation, RCA, runbook, major incident, on-call."


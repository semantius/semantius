catalog_tagline: "Run the single source of truth for your workforce, from the employee record to org structure, positions, and the full hire-to-retire lifecycle."
catalog_description: |
  Human Capital Management is the system of record for your people. Maintain every worker's core profile, employment contracts, and the org structure they sit in, then drive each change through a governed workflow: hiring, transfers, promotions, leaves of absence, and offboarding. Self-service lets employees and managers raise and track their own changes while HR retains approval control.

  Because the worker record is authoritative, the lifecycle events you record here ripple cleanly downstream: a new hire provisions access and payroll, a termination recalls assets and closes accounts, a promotion updates compensation. You define jobs and positions once, plan headcount against them, and keep compliance evidence in step with the regulations that apply to your workforce.

# Rendered into the SKILL.md frontmatter description:.
skill_description: "Maintain the authoritative worker record (profiles, addresses, national IDs, emergency contacts, dependents, work-eligibility documents) and employment contracts; design the org structure with job profiles, positions, and org units; plan headcount against budgeted roles; and drive every people change through governed lifecycle workflows: hiring and onboarding, transfers, promotions, leaves, and offboarding. Let employees and managers raise and track self-service change requests while HR keeps approval control, and keep compliance evidence current. Use for: HRIS, HRMS, core HR, personnel file, employee data, reporting lines, span of control, FTE, new starter, leaver, termination, separation, joiner mover leaver, secondment, reorg, effective dating, approval routing, people operations, system of record."


catalog_description: |
  Run corporate learning end to end. Author and publish courses, deliver them online or in the classroom, and track every enrollment through to completion. Issue the certifications and badges that show who is qualified, and keep the evidence auditors and regulators ask for. Assign mandatory training automatically, chase overdue learners without manual follow-up, and feed completion signals to the HR, compliance, and identity systems that depend on them.

# Rendered into the SKILL.md frontmatter description:.
skill_description: "Author courses from lessons and assessments, publish new versions, and deliver self-paced training in the browser. Enroll learners and track each one through to completion, grade quizzes and exams, and post transcripts. Schedule instructor-led and virtual classroom sessions, book rooms, manage waitlists, and capture attendance. Assign mandatory compliance training, chase overdue learners, and keep audit-ready evidence for regulators. Issue certifications and badges, manage renewals and expiry, and let others verify them. Sequence learning paths tied to the skills a role needs, recommend the next course, and automate enrollments, reminders, and escalations. Handle learner consent and data-deletion requests. Use for: LMS, e-learning, SCORM, xAPI, Tin Can, cmi5, LRS, microlearning, blended learning, ILT, VILT, webinar, micro-credential, Open Badges, CEU, continuing education, recertification, OSHA, HIPAA, SOX, GDPR, anti-harassment, onboarding training, upskilling, reskilling, curriculum, course catalog, gradebook, proctoring, attestation, talent development, corporate L&D."

